<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tap Frenzy+</title>
  <meta name="description" content="A fast-paced tap game with combos, power-ups, levels and sounds. How high can you score?">
  <meta property="og:title" content="Tap Frenzy+">
  <meta property="og:description" content="Hit targets fast. Build your combo. Don't miss. Play free!">
  <meta property="og:type" content="website">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3098959460651041" crossorigin="anonymous"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f13;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #fff;
    }

    #wrap {
      width: 100%;
      max-width: 480px;
      background: #1a1a24;
      border-radius: 16px;
      border: 0.5px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    #hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      padding: 10px 12px;
      background: #111118;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }

    .hud-cell { display: flex; flex-direction: column; align-items: center; }
    .hud-lbl { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: .05em; }
    .hud-val { font-size: clamp(18px, 4vw, 26px); font-weight: 600; color: #fff; line-height: 1.2; }

    #xp-wrap { height: 5px; background: rgba(255,255,255,0.1); }
    #xp-fill { height: 5px; background: #8B5CF6; width: 0%; transition: width .25s; }

    #arena {
      position: relative;
      width: 100%;
      cursor: crosshair;
      overflow: hidden;
      touch-action: none;
      background: #0f0f18;
    }

    .tgt {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      transition: transform .06s;
      touch-action: manipulation;
      box-shadow: 0 3px 12px rgba(0,0,0,0.4);
    }
    .tgt:active { transform: scale(.88) !important; }
    .tgt.gone { transform: scale(0) !important; opacity: 0; transition: transform .1s, opacity .1s; }

    .floaty {
      position: absolute;
      pointer-events: none;
      font-weight: 700;
      animation: fup .65s ease-out forwards;
      white-space: nowrap;
    }
    @keyframes fup {
      0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-48px) scale(1.15); }
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.4);
      pointer-events: none;
      animation: shrink linear forwards;
    }
    @keyframes shrink {
      from { transform: scale(1.85); opacity: .55; }
      to   { transform: scale(1);    opacity: 0; }
    }

    #miss-flash  { position: absolute; inset: 0; background: rgba(200,40,40,.22); opacity: 0; pointer-events: none; transition: opacity .1s; }
    #freeze-ov   { position: absolute; inset: 0; background: rgba(100,180,255,.15); opacity: 0; pointer-events: none; transition: opacity .3s; }

    .badge-pop {
      position: absolute;
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 700;
      pointer-events: none;
      animation: bpop .9s ease-out forwards;
      white-space: nowrap;
      background: rgba(0,0,0,.6);
      padding: 8px 18px;
      border-radius: 20px;
    }
    @keyframes bpop {
      0%  { opacity: 0; transform: translate(-50%,-50%) scale(.7); }
      15% { opacity: 1; transform: translate(-50%,-50%) scale(1.08); }
      80% { opacity: 1; transform: translate(-50%,-60px) scale(1); }
      100%{ opacity: 0; transform: translate(-50%,-80px) scale(.9); }
    }

    .pwup {
      position: absolute;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,.55);
      animation: ppulse 1s ease-in-out infinite alternate;
      touch-action: manipulation;
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
    }
    @keyframes ppulse { from { transform: scale(1); } to { transform: scale(1.1); } }

    /* ── OVERLAY ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.72);
      gap: 10px;
      padding: 16px;
      overflow-y: auto;
    }
    #overlay h2 { color: #fff; font-size: clamp(20px,5vw,26px); font-weight: 700; }

    .sub { color: rgba(255,255,255,.6); font-size: clamp(11px,2.5vw,13px); text-align: center; line-height: 1.5; }
    .big-score { font-size: clamp(40px,10vw,58px); font-weight: 700; color: #fff; line-height: 1; }

    .trow { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; }
    .tbtn {
      background: rgba(255,255,255,.1);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.2);
      padding: 8px 15px;
      border-radius: 20px;
      font-size: clamp(12px,3vw,14px);
      font-weight: 600;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tbtn.sel { background: #fff; color: #111; border-color: #fff; }
    .tbtn:hover { background: rgba(255,255,255,.2); }

    .cust-row { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 280px; }
    .cust-row input[type=range] { flex: 1; min-width: 0; accent-color: #8B5CF6; }
    .cust-lbl { color: #fff; font-size: 13px; font-weight: 600; min-width: 40px; text-align: right; }

    .go-btn {
      background: #fff;
      color: #111;
      border: none;
      padding: 13px 44px;
      border-radius: 24px;
      font-size: clamp(14px,3.5vw,16px);
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
      margin-top: 4px;
    }
    .go-btn:hover { background: #eee; }

    .audio-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .abtn {
      background: rgba(255,255,255,.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,.22);
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
    }
    .abtn.off { opacity: .4; }
    #vol-sl { width: 80px; accent-color: #8B5CF6; }

    /* ── AD SLOTS ── */
    .ad-slot {
      width: 100%;
      max-width: 320px;
      min-height: 60px;
      background: rgba(255,255,255,.05);
      border: 1px dashed rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      font-size: 11px;
      color: rgba(255,255,255,.3);
    }
    .ad-slot strong { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,.2); }

    /* ── SHARE BUTTONS ── */
    .share-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      min-height: 40px;
      color: #fff;
    }
    .share-btn.li { background: #0A66C2; }
    .share-btn.ig { background: #C13584; }
    .share-btn.cp { background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.3); }
    .share-btn:hover { opacity: .85; }

    .pwup-legend { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .leg-item { color: rgba(255,255,255,.6); font-size: 11px; }

    .copied-toast {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #111;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      pointer-events: none;
      white-space: nowrap;
      animation: toastIn .2s ease-out forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) scale(.9); } to { opacity: 1; transform: translateX(-50%) scale(1); } }

    /* ── STATS BAR ── */
    #stats-bar {
      display: none;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 8px 12px;
      background: #111118;
      border-top: 0.5px solid rgba(255,255,255,0.08);
    }
    .stat-chip { font-size: 12px; color: rgba(255,255,255,.45); }
    .stat-chip span { font-weight: 600; color: #fff; }
  </style>
</head>
<body>

<div id="wrap">
  <div id="hud">
    <div class="hud-cell"><div class="hud-lbl">score</div><div class="hud-val" id="h-score">0</div></div>
    <div class="hud-cell"><div class="hud-lbl">combo</div><div class="hud-val" id="h-combo">x1</div></div>
    <div class="hud-cell"><div class="hud-lbl">level</div><div class="hud-val" id="h-level">1</div></div>
    <div class="hud-cell"><div class="hud-lbl">time</div><div class="hud-val" id="h-time">30</div></div>
  </div>
  <div id="xp-wrap"><div id="xp-fill"></div></div>

  <div id="arena">
    <div id="miss-flash"></div>
    <div id="freeze-ov"></div>
    <div id="overlay">
      <h2>Tap Frenzy+</h2>
      <div class="sub">Combos · Power-ups · Levels · Sounds</div>

      <!-- AD SLOT 1 — Start screen -->
      <div style="width:100%;max-width:320px;min-height:60px;text-align:center;">
        <ins class="adsbygoogle"
             style="display:block;width:320px;height:50px;"
             data-ad-client="ca-pub-3098959460651041"
             data-ad-slot="auto"
             data-ad-format="banner"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>

      <div class="audio-row">
        <button class="abtn" id="music-btn">♪ Music</button>
        <button class="abtn" id="sfx-btn">◉ SFX</button>

<script>
// ✅ UPDATE THIS to your actual hosted URL (e.g. https://tapfrenzy.netlify.app)
const GAME_URL = 'https://kumargit767.github.io/tapfrenzy/';

let actx = null, musicOn = true, sfxOn = true, masterVol = 0.6;
let bgNodes = [], bgGain = null, urgentNodes = [], urgentGain = null;
let score = 0, combo = 1, bestCombo = 1, timeLeft = 30, chosenTime = 30;
let running = false, frozen = false, doublePoints = false, urgentStarted = false;
let level = 1, xp = 0, xpNeeded = 10, hitCount = 0, missCount = 0, highScore = 0;
let spawnTout, cdInt, targets = [], pwups = [];

const COLORS = ['#4F46E5','#0EA5E9','#10B981','#D85A30','#8B5CF6','#EC4899','#0D9488','#B45309'];
const SHAPES = ['★','●','◆','▲','♥','✦'];

/* ── AUDIO ── */
function getCtx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function playTone(freq, type, dur, vol, dst, delay = 0) {
  const ctx = getCtx(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(dst || ctx.destination);
  const t = ctx.currentTime + delay;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol * masterVol, t + .01);
  g.gain.exponentialRampToValueAtTime(.0001, t + dur);
  o.start(t); o.stop(t + dur + .05);
}
function playHit(c) {
  if (!sfxOn) return;
  const notes = [261,294,329,370,415,466,523,587,659,740,880,987,1047,1175,1319,1480];
  const f = notes[Math.min(c - 1, notes.length - 1)];
  playTone(f, 'sine', .12, .35);
  playTone(f * 2, 'sine', .08, .12, null, .02);
  if (c >= 5) playTone(f * 1.5, 'triangle', .15, .1, null, .04);
}
function playMiss() { if (!sfxOn) return; playTone(180,'sawtooth',.08,.2); playTone(140,'sawtooth',.12,.15,null,.05); }
function playPowerup(id) {
  if (!sfxOn) return;
  if (id==='freeze')  [800,600,400,300].forEach((f,i) => playTone(f,'sine',.18,.2,null,i*.07));
  if (id==='double')  [400,600,800,1000,1200].forEach((f,i) => playTone(f,'square',.1,.15,null,i*.05));
  if (id==='clear')   [300,500,700,900,1100,1300].forEach((f,i) => playTone(f,'sine',.2,.18,null,i*.04));
  if (id==='bomb')    { playTone(60,'sawtooth',.4,.4); [400,300,200,100].forEach((f,i) => playTone(f,'sawtooth',.1,.2,null,i*.06)); }
}
function playLevelUp()  { if (!sfxOn) return; [523,659,784,1047].forEach((f,i) => playTone(f,'sine',.25,.3,null,i*.1)); }
function playCountdown(){ if (!sfxOn) return; playTone(880,'sine',.15,.4); }
function playGameOver() { if (!sfxOn) return; [523,415,330,262].forEach((f,i) => playTone(f,'sine',.4,.3,null,i*.12)); }
function playNewBest()  { if (!sfxOn) return; [523,659,784,880,1047,880,784,659,784,1047].forEach((f,i) => playTone(f,'sine',.18,.3,null,i*.08)); }
function playComboMilestone(l) {
  if (!sfxOn) return;
  if (l===5)  [261,329,392,523].forEach((f,i) => playTone(f,'triangle',.2,.25,null,i*.08));
  if (l===10) [523,659,784,659,784,1047].forEach((f,i) => playTone(f,'sine',.2,.3,null,i*.07));
  if (l===16) for(let i=0;i<8;i++) playTone(440+i*120,'square',.15,.2,null,i*.06);
}

function startBgMusic() {
  if (!musicOn || !actx) return;
  stopBgMusic();
  const ctx = actx, bpm = 128, beat = 60/bpm;
  bgGain = ctx.createGain(); bgGain.gain.value = .18 * masterVol; bgGain.connect(ctx.destination);
  const bass = [55,55,73,55,65,55,73,73], now = ctx.currentTime;
  function sBass(t) {
    if (!running && !bgGain) return;
    bass.forEach((f,i) => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=f; o.connect(g); g.connect(bgGain);
      const st=t+i*beat*.5; g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.6,st+.02); g.gain.exponentialRampToValueAtTime(.001,st+beat*.45); o.start(st); o.stop(st+beat*.5);
    });
    bgNodes.push(setTimeout(() => sBass(ctx.currentTime), bass.length*beat*.5*1000-80));
  }
  function sHat(t) {
    if (!running && !bgGain) return;
    for(let i=0;i<8;i++) { const buf=ctx.createBuffer(1,ctx.sampleRate*.05,ctx.sampleRate),d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.exp(-j/800); const src=ctx.createBufferSource(),g=ctx.createGain(); src.buffer=buf; g.gain.value=.35; src.connect(g); g.connect(bgGain); src.start(t+i*beat*.25); }
    bgNodes.push(setTimeout(() => sHat(ctx.currentTime), 8*beat*.25*1000-80));
  }
  function sKick(t) {
    if (!running && !bgGain) return;
    [0,1,2,3].forEach(i => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(150,t+i*beat); o.frequency.exponentialRampToValueAtTime(30,t+i*beat+.15); o.connect(g); g.connect(bgGain); g.gain.setValueAtTime(1,t+i*beat); g.gain.exponentialRampToValueAtTime(.001,t+i*beat+.3); o.start(t+i*beat); o.stop(t+i*beat+.35); });
    bgNodes.push(setTimeout(() => sKick(ctx.currentTime), 4*beat*1000-80));
  }
  sBass(now); sHat(now+beat*.125); sKick(now);
}
function stopBgMusic() { bgNodes.forEach(t=>clearTimeout(t)); bgNodes=[]; if(bgGain){try{bgGain.disconnect();}catch(e){} bgGain=null;} }
function startUrgentMusic() {
  if (!musicOn || !actx) return;
  stopBgMusic();
  urgentGain = actx.createGain(); urgentGain.gain.value = .22*masterVol; urgentGain.connect(actx.destination);
  const ctx=actx, bpm=170, beat=60/bpm, notes=[110,110,146,110,110,130,110,146];
  function sUrg(t) {
    if (!running) return;
    notes.forEach((f,i) => { const o=ctx.createOscillator(),g=ctx.createGain(); o.type='square'; o.frequency.value=f; o.connect(g); g.connect(urgentGain); const st=t+i*beat*.5; g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(.5,st+.01); g.gain.exponentialRampToValueAtTime(.001,st+beat*.4); o.start(st); o.stop(st+beat*.5); });
    urgentNodes.push(setTimeout(() => sUrg(ctx.currentTime), notes.length*beat*.5*1000-80));
  }
  sUrg(actx.currentTime);
}
function stopUrgentMusic() { urgentNodes.forEach(t=>clearTimeout(t)); urgentNodes=[]; if(urgentGain){try{urgentGain.disconnect();}catch(e){} urgentGain=null;} }
function stopAllMusic() { stopBgMusic(); stopUrgentMusic(); }

/* ── UI CONTROLS ── */
document.getElementById('music-btn').addEventListener('click', function() {
  musicOn = !musicOn; this.classList.toggle('off', !musicOn); this.textContent = musicOn ? '♪ Music' : '♪ Muted';
  if (running) { if (musicOn) { if (timeLeft<=5) startUrgentMusic(); else startBgMusic(); } else stopAllMusic(); }
});
document.getElementById('sfx-btn').addEventListener('click', function() {
  sfxOn = !sfxOn; this.classList.toggle('off', !sfxOn); this.textContent = sfxOn ? '◉ SFX' : '◉ SFX off';
});
document.getElementById('vol-sl').addEventListener('input', function() {
  masterVol = parseInt(this.value)/100;
  if (bgGain) bgGain.gain.value = .18 * masterVol;
  if (urgentGain) urgentGain.gain.value = .22 * masterVol;
});

document.getElementById('trow').querySelectorAll('.tbtn').forEach(b => {
  b.addEventListener('click', () => {
    document.getElementById('trow').querySelectorAll('.tbtn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel'); chosenTime = parseInt(b.dataset.v);
    document.getElementById('cslider').value = chosenTime;
    document.getElementById('clbl').textContent = fmt(chosenTime);
  });
});
document.getElementById('cslider').addEventListener('input', function() {
  chosenTime = parseInt(this.value); document.getElementById('clbl').textContent = fmt(chosenTime);
  document.getElementById('trow').querySelectorAll('.tbtn').forEach(b => b.classList.toggle('sel', parseInt(b.dataset.v) === chosenTime));
});

/* ── HELPERS ── */
function fmt(s) { return s>=60 ? `${Math.floor(s/60)}m${s%60>0?s%60+'s':''}` : `${s}s`; }
function arenaH() { const vw=window.innerWidth; return vw<480?340:vw<768?390:430; }
function setArenaH() { document.getElementById('arena').style.height = arenaH()+'px'; }
function tgtSize() { const vw=window.innerWidth,s=vw<480?52:44,m=vw<480?66:58,b=vw<480?80:70,r=Math.random(); return r<.2?s:r<.5?m:b; }
setArenaH(); window.addEventListener('resize', setArenaH);

const arena = document.getElementById('arena');
const overlay = document.getElementById('overlay');

/* ── SPAWN TARGET ── */
function spawnTarget() {
  if (!running) return;
  const size=tgtSize(), pad=size/2+6, W=arena.offsetWidth, H=arenaH();
  const x=pad+Math.random()*(W-pad*2), y=pad+Math.random()*(H-pad*2);
  const bg=COLORS[Math.floor(Math.random()*COLORS.length)];
  const lifeBase=frozen?2600:Math.max(700,1350-level*45);
  const life=lifeBase+Math.random()*500;
  const pts=size<54?30:size<68?20:10;

  const el=document.createElement('div'); el.className='tgt';
  el.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;background:${bg};color:#fff;font-size:${Math.round(size*.38)}px;`;
  el.textContent=SHAPES[Math.floor(Math.random()*SHAPES.length)];

  const ring=document.createElement('div'); ring.className='ring';
  ring.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;animation-duration:${life}ms;`;
  arena.appendChild(ring);

  const timer=setTimeout(()=>{ if(el.parentNode){el.remove();ring.remove();onMiss();} },life);
  function doHit(e) {
    e.preventDefault(); e.stopPropagation();
    if(el.classList.contains('gone')) return;
    clearTimeout(timer); el.classList.add('gone'); ring.remove();
    setTimeout(()=>el.remove(),120); onHit(pts,x,y);
  }
  el.addEventListener('click', doHit); el.addEventListener('touchend', doHit, {passive:false});
  arena.appendChild(el); targets.push({el, timer});
}

/* ── SPAWN POWER-UP ── */
function spawnPowerup() {
  if (!running || Math.random() > .4) return;
  const types = [
    {id:'freeze',label:'❄',bg:'#3B82F6',desc:'Time frozen!'},
    {id:'double',label:'⚡',bg:'#F59E0B',desc:'2x points!'},
    {id:'clear', label:'☄',bg:'#8B5CF6',desc:'Field cleared!'},
    {id:'bomb',  label:'💣',bg:'#EF4444',desc:'BOMB!'},
  ];
  const t=types[Math.floor(Math.random()*types.length)];
  const vw=window.innerWidth, size=vw<480?62:56, pad=size/2+8;
  const W=arena.offsetWidth, H=arenaH();
  const x=pad+Math.random()*(W-pad*2), y=pad+Math.random()*(H-pad*2);
  const el=document.createElement('div'); el.className='pwup';
  el.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;background:${t.bg};font-size:${Math.round(size*.42)}px;`;
  el.textContent=t.label;
  const timer=setTimeout(()=>{ if(el.parentNode) el.remove(); },3500);
  function doPw(e) { e.preventDefault(); e.stopPropagation(); clearTimeout(timer); el.remove(); activatePowerup(t); }
  el.addEventListener('click', doPw); el.addEventListener('touchend', doPw, {passive:false});
  arena.appendChild(el); pwups.push({el, timer});
}

function activatePowerup(t) {
  playPowerup(t.id); showBadge(t.desc);
  if(t.id==='freeze') { frozen=true; document.getElementById('freeze-ov').style.opacity='1'; setTimeout(()=>{ frozen=false; document.getElementById('freeze-ov').style.opacity='0'; },4000); }
  else if(t.id==='double') { doublePoints=true; setTimeout(()=>doublePoints=false,5000); }
  else if(t.id==='clear') { [...targets].forEach(t=>{clearTimeout(t.timer);t.el.classList.add('gone');setTimeout(()=>t.el.remove(),120);}); targets=[]; score+=combo*15; updateHUD(); }
  else if(t.id==='bomb')  { onMiss();onMiss();onMiss(); document.getElementById('miss-flash').style.opacity='1'; setTimeout(()=>document.getElementById('miss-flash').style.opacity='0',300); }
}

/* ── HIT / MISS ── */
function onHit(basePts, x, y) {
  hitCount++; combo=Math.min(combo+1,16); if(combo>bestCombo) bestCombo=combo;
  const pts=basePts*combo*(doublePoints?2:1); score+=pts; xp++;
  playHit(combo);
  if(xp>=xpNeeded) { xp=0; xpNeeded=Math.round(xpNeeded*1.4); level++; playLevelUp(); showBadge(`Level ${level}!`); }
  updateHUD(); showFloaty(`+${pts}`,x,y,doublePoints?'#FACC15':'#4ade80');
  if(combo===5)  { showBadge('On fire!');      playComboMilestone(5);  }
  if(combo===10) { showBadge('Unstoppable!');   playComboMilestone(10); }
  if(combo===16) { showBadge('GODLIKE!');       playComboMilestone(16); }
}
function onMiss() {
  missCount++; combo=1;
  document.getElementById('h-combo').textContent='x1';
  document.getElementById('h-combo').style.color='#fff';
  document.getElementById('miss-flash').style.opacity='1';
  setTimeout(()=>document.getElementById('miss-flash').style.opacity='0',140);
  playMiss();
}
function updateHUD() {
  document.getElementById('h-score').textContent=score.toLocaleString();
  document.getElementById('h-combo').textContent=`x${combo}`;
  document.getElementById('h-combo').style.color=combo>=10?'#EF4444':combo>=6?'#F59E0B':combo>=3?'#8B5CF6':'#fff';
  document.getElementById('h-level').textContent=level;
  document.getElementById('xp-fill').style.width=Math.round(xp/xpNeeded*100)+'%';
}
function showFloaty(txt,x,y,color) { const f=document.createElement('div'); f.className='floaty'; f.style.cssText=`left:${x}px;top:${y}px;color:${color};font-size:15px;`; f.textContent=txt; arena.appendChild(f); setTimeout(()=>f.remove(),700); }
function showBadge(txt) { const b=document.createElement('div'); b.className='badge-pop'; b.textContent=txt; arena.appendChild(b); setTimeout(()=>b.remove(),950); }

/* ── SPAWN SCHEDULING ── */
function getSpawnRate() { const pct=timeLeft/chosenTime,base=pct>.66?900:pct>.33?650:430; return Math.max(290,base-level*18); }
function scheduleSpawn() { if(!running)return; spawnTarget(); if(Math.random()<.12+level*.015) spawnTarget(); spawnTout=setTimeout(scheduleSpawn,getSpawnRate()); }
function schedulePw() { if(!running)return; if(Math.random()<.4) spawnPowerup(); setTimeout(schedulePw,4000+Math.random()*4000); }
function clearArena() { targets.forEach(t=>{clearTimeout(t.timer);t.el.remove();}); pwups.forEach(p=>{clearTimeout(p.timer);p.el.remove();}); targets=[];pwups=[]; arena.querySelectorAll('.ring,.floaty,.badge-pop,.pwup').forEach(e=>e.remove()); }

/* ── SHARE ── */
function shareLinkedIn(sc) { const text=encodeURIComponent(`I just scored ${sc.toLocaleString()} on Tap Frenzy+! Can you beat it?\n\nPlay free: ${GAME_URL}`); window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(GAME_URL)}&summary=${text}`,'_blank'); }
function shareInsta(sc)    { copyLink(`I just scored ${sc.toLocaleString()} on Tap Frenzy+! Can you beat it? Play free → ${GAME_URL}`,true); }
function copyLink(text, forInsta=false) { navigator.clipboard.writeText(text).then(()=>showToast(forInsta?'Caption copied — paste into Instagram!':'Link copied!')).catch(()=>showToast('Copy failed — try manually')); }
function showToast(msg) { const t=document.createElement('div'); t.className='copied-toast'; t.textContent=msg; overlay.appendChild(t); setTimeout(()=>t.remove(),2400); }

/* ── GAME LOOP ── */
function startGame() {
  getCtx();
  score=0;combo=1;bestCombo=1;timeLeft=chosenTime;running=true;frozen=false;doublePoints=false;urgentStarted=false;
  level=1;xp=0;xpNeeded=10;hitCount=0;missCount=0;
  document.getElementById('h-score').textContent='0';
  document.getElementById('h-combo').textContent='x1'; document.getElementById('h-combo').style.color='#fff';
  document.getElementById('h-level').textContent='1';
  document.getElementById('h-time').textContent=timeLeft; document.getElementById('h-time').style.color='#fff';
  document.getElementById('xp-fill').style.width='0%';
  document.getElementById('freeze-ov').style.opacity='0';
  overlay.style.display='none'; document.getElementById('stats-bar').style.display='none';
  clearArena(); setArenaH(); stopAllMusic(); startBgMusic(); scheduleSpawn(); schedulePw();
  cdInt=setInterval(()=>{
    if(frozen) return;
    timeLeft--; document.getElementById('h-time').textContent=timeLeft;
    if(timeLeft<=5) { document.getElementById('h-time').style.color='#EF4444'; playCountdown(); if(!urgentStarted){urgentStarted=true;stopBgMusic();startUrgentMusic();} }
    if(timeLeft<=0) endGame();
  },1000);
}

function endGame() {
  running=false; clearTimeout(spawnTout); clearInterval(cdInt); clearArena(); stopAllMusic();
  const isNew=score>highScore; if(isNew) highScore=score;
  if(isNew) playNewBest(); else playGameOver();
  const total=hitCount+missCount, acc=total>0?Math.round(hitCount/total*100):0;
  document.getElementById('st-hits').textContent=hitCount;
  document.getElementById('st-miss').textContent=missCount;
  document.getElementById('st-acc').textContent=acc+'%';
  document.getElementById('st-bc').textContent='x'+bestCombo;
  document.getElementById('stats-bar').style.display='flex';
  document.getElementById('hs-disp') && (document.getElementById('hs-disp').textContent=`best: ${highScore.toLocaleString()}`);

  overlay.innerHTML=`
    <h2>${isNew?'New best! 🎉':'Time\'s up!'}</h2>
    <div class="big-score">${score.toLocaleString()}</div>
    <div class="sub">Level ${level} · combo x${bestCombo} · ${acc}% accuracy</div>
    <div class="sub" style="font-size:11px;">all time best: ${highScore.toLocaleString()}</div>

    <div class="share-row">
      <button class="share-btn li" id="sh-li">in Share score</button>
      <button class="share-btn ig" id="sh-ig">ig Copy for Insta</button>
      <button class="share-btn cp" id="sh-cp">Copy link</button>
    </div>

    <!-- AD SLOT 2 — Results screen -->
    <div style="width:100%;max-width:320px;min-height:60px;text-align:center;">
      <ins class="adsbygoogle"
           style="display:block;width:320px;height:50px;"
           data-ad-client="ca-pub-3098959460651041"
           data-ad-slot="auto"
           data-ad-format="banner"
           data-full-width-responsive="true"></ins>
    </div>

    <div class="audio-row">
      <button class="abtn${musicOn?'':' off'}" id="mb2">${musicOn?'♪ Music':'♪ Muted'}</button>
      <button class="abtn${sfxOn?'':' off'}" id="sb2">${sfxOn?'◉ SFX':'◉ SFX off'}</button>
    </div>
    <div class="trow" id="trow2">
      <button class="tbtn" data-v="15">15s</button><button class="tbtn" data-v="30">30s</button>
      <button class="tbtn" data-v="60">60s</button><button class="tbtn" data-v="90">90s</button>
      <button class="tbtn" data-v="120">2m</button>
    </div>
    <div class="cust-row">
      <span style="color:rgba(255,255,255,.5);font-size:11px;white-space:nowrap;">custom</span>
      <input type="range" id="cslider2" min="10" max="180" step="5" value="${chosenTime}">
      <span class="cust-lbl" id="clbl2">${fmt(chosenTime)}</span>
    </div>
    <button class="go-btn" id="go-btn2">Play again</button>
  `;
  overlay.style.display='flex';
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
  document.getElementById('sh-li').addEventListener('click',()=>shareLinkedIn(score));
  document.getElementById('sh-ig').addEventListener('click',()=>shareInsta(score));
  document.getElementById('sh-cp').addEventListener('click',()=>copyLink(GAME_URL));
  document.getElementById('mb2').addEventListener('click',function(){musicOn=!musicOn;this.classList.toggle('off',!musicOn);this.textContent=musicOn?'♪ Music':'♪ Muted';document.getElementById('music-btn').textContent=this.textContent;});
  document.getElementById('sb2').addEventListener('click',function(){sfxOn=!sfxOn;this.classList.toggle('off',!sfxOn);this.textContent=sfxOn?'◉ SFX':'◉ SFX off';document.getElementById('sfx-btn').textContent=this.textContent;});

  const tr=overlay.querySelector('#trow2');
  tr.querySelectorAll('.tbtn').forEach(b=>{
    if(parseInt(b.dataset.v)===chosenTime) b.classList.add('sel');
    b.addEventListener('click',()=>{ tr.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); chosenTime=parseInt(b.dataset.v); document.getElementById('cslider2').value=chosenTime; document.getElementById('clbl2').textContent=fmt(chosenTime); });
  });
  document.getElementById('cslider2').addEventListener('input',function(){ chosenTime=parseInt(this.value); document.getElementById('clbl2').textContent=fmt(chosenTime); tr.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.v)===chosenTime)); });
  document.getElementById('go-btn2').addEventListener('click',startGame);
}

/* ── ARENA MISS DETECTION ── */
arena.addEventListener('click',e=>{ if(!running)return; if(e.target===arena||e.target===document.getElementById('miss-flash')||e.target===document.getElementById('freeze-ov')) onMiss(); });
arena.addEventListener('touchend',e=>{ if(!running)return; if(e.target===arena||e.target===document.getElementById('miss-flash')||e.target===document.getElementById('freeze-ov')){e.preventDefault();onMiss();} },{passive:false});
document.getElementById('go-btn').addEventListener('click',startGame);
</script>
</body>
</html>
